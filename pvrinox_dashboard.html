<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bank Offers Performance Dashboard</title>
  <meta http-equiv="refresh" content="0; url=./dist/index.html" />
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f8f9fb;
      color: #1a202c;
      font-family: Arial, sans-serif;
    }
    .card {
      max-width: 560px;
      margin: 24px;
      padding: 24px;
      border: 1px solid #e2e8f0;
      border-radius: 20px;
      background: #fff;
      box-shadow: 0 18px 48px rgba(26, 32, 44, 0.08);
    }
    a {
      color: #2563eb;
      font-weight: 700;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Opening dashboard...</h1>
    <p>If the redirect does not happen automatically, open <a href="./dist/index.html">dist/index.html</a>.</p>
    <p>For live development, run <strong>npm run dev</strong> in this folder.</p>
  </div>
</body>
</html>
